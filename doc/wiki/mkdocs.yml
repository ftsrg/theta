site_name: 'Theta Wiki'
docs_dir: 'docs'

markdown_extensions:
    - mdx_math:
        enable_dollar_delimiter: True
    - admonition
    - pymdownx.superfences:
        custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:pymdownx.superfences.fence_code_format
    - footnotes
    - attr_list
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - abbr
    - pymdownx.snippets:
        auto_append:
            - abbreviations.md
        base_path:
            - .        # doc/wiki (mkdocs' working dir) — keeps abbreviations.md resolving
            - ../..    # repo root — lets pages transclude module docs: --8<-- "subprojects/.../USING.md"

plugins:
    - search
    - awesome-pages:
        collapse_single_pages: true

# Pulls README.md / USING.md / CLAUDE.md from the modules and doc/ onto the wiki.
hooks:
    - hooks.py

# Live-reload `mkdocs serve` when a mirrored doc changes.
watch:
    - ../../subprojects
    - ../../doc
    - ../../CLAUDE.md

# Mirrored pages link to source files on GitHub; mkdocs can't resolve those itself.
validation:
    links:
        not_found: ignore

repo_url: https://github.com/ftsrg/theta
repo_name: ftsrg/theta

theme:
    name: material
    logo: assets/icon.png
    favicon: assets/icon.png
    features:
        - navigation.top          # back-to-top button
        - navigation.tracking     # URL follows the active anchor
        - navigation.indexes      # a section's index.md becomes the section landing page
        - toc.follow
        - search.suggest
        - search.highlight
        - content.code.copy
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: custom
          accent: custom
          toggle:
              icon: material/weather-night
              name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: custom
          accent: custom
          toggle:
              icon: material/weather-sunny
              name: Switch to light mode

extra_css:
    - assets/theme.css

extra_javascript:
    - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML
